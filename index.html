<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flow State SFX Manager Pro</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --panel-bg: #141414;
            --accent: #007aff;
            --text: #e0e0e0;
            --border: #282828;
            --input-bg: #1e1e1e;
            --danger: #ff453a;
            --success: #32d74b;
            --icon-color: #888;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* --- Global SVG Icon Styles --- */
        .icon { width: 16px; height: 16px; min-width: 16px; min-height: 16px; max-width: 16px; max-height: 16px; flex-shrink: 0; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; display: inline-block; }
        .icon-sm { width: 14px; height: 14px; min-width: 14px; min-height: 14px; max-width: 14px; max-height: 14px; }
        .icon-lg { width: 24px; height: 24px; min-width: 24px; min-height: 24px; max-width: 24px; max-height: 24px; }
        .fill-icon { fill: currentColor; stroke: none; }

        /* --- Left Sidebar: Tag Manager --- */
        #left-sidebar { width: 280px; background: var(--panel-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: width 0.3s ease, min-width 0.3s ease; overflow: hidden; white-space: nowrap; }
        #left-sidebar.collapsed { width: 0; min-width: 0; border-right: none; }
        .panel-header { padding: 15px; font-weight: bold; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        #tag-manager-list { flex: 1; overflow-y: auto; padding: 15px; list-style: none; margin: 0; }
        .tag-edit-item { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
        .tag-edit-item input { flex: 1; min-width: 0; }
        .panel-footer { padding: 15px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
        
        /* --- Center Workspace --- */
        #main { flex: 1; display: flex; flex-direction: column; position: relative; }
        #top-bar { padding: 15px; display: flex; border-bottom: 1px solid var(--border); align-items: center; gap: 10px;}
        #workspace-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; overflow-y: auto; }

        /* --- Right Sidebar: File Explorer (Tree View) --- */
        #right-sidebar { min-width: 250px; width: 400px; max-width: 700px; background: var(--panel-bg); border-left: 1px solid var(--border); display: flex; flex-direction: column; position: relative; }
        #resizer { width: 4px; cursor: col-resize; background: transparent; position: absolute; left: -2px; top: 0; bottom: 0; z-index: 10; }
        #resizer:hover { background: var(--accent); }
        
        #file-list-container { flex: 1; overflow-y: auto; padding: 10px 0; }
        .tree-list { list-style: none; padding-left: 15px; margin: 0; }
        #file-list-container > .tree-list { padding-left: 0; } 
        
        .folder-item { margin: 2px 0; }
        .folder-title { padding: 8px 15px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: #aaa; }
        .folder-title:hover { background: #1e1e1e; color: white; }
        .folder-icon { color: var(--accent); transition: 0.2s; }
        .folder-item.collapsed .folder-icon { color: var(--icon-color); }
        .folder-contents { overflow: hidden; }
        .folder-item.collapsed .folder-contents { display: none; }
        
        .file-item { padding: 8px 15px 8px 25px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .file-item:hover { background: #1a1a1a; }
        .file-item.active { background: #1e1e1e; border-left: 3px solid var(--accent); padding-left: 22px; }
        
        .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .file-item input.rename-input { flex: 1; }
        .file-item.renamed .file-name::before { content: ''; display: inline-block; width: 6px; height: 6px; min-width: 6px; background: var(--success); border-radius: 50%; flex-shrink: 0; }

        /* --- Custom Player --- */
        #custom-player { width: 100%; max-width: 600px; background: #1a1a1a; padding: 20px; border-radius: 12px; margin-bottom: 30px; }
        .player-controls { display: flex; align-items: center; justify-content: center; gap: 20px; margin-top: 15px; }
        #progress-container { width: 100%; height: 6px; background: #333; border-radius: 3px; cursor: pointer; position: relative; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); border-radius: 3px; pointer-events: none; }
        .time-info { display: flex; justify-content: space-between; font-size: 11px; margin-top: 5px; color: var(--icon-color); }

        /* --- Inputs & Buttons --- */
        input[type="text"] { background: var(--input-bg); border: 1px solid var(--border); color: white; padding: 6px 10px; border-radius: 4px; font-size: 13px; outline: none; }
        input[type="text"]:focus { border-color: var(--accent); }
        .btn { display: flex; align-items: center; justify-content: center; gap: 8px; background: #2a2a2a; color: white; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .btn:hover { background: #3a3a3a; }
        .btn-accent { background: var(--accent); }
        .btn-accent:hover { background: #005ecb; }
        .btn-danger { color: var(--danger); }
        .btn-danger:hover { background: rgba(255, 69, 58, 0.1); }
        .btn-icon { background: transparent; border: none; color: var(--icon-color); cursor: pointer; padding: 6px; border-radius: 4px; transition: 0.2s; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .btn-icon:hover { color: white; background: rgba(255,255,255,0.05); }
        .tag-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; width: 100%; max-width: 600px; }

        /* --- Active Workspace Tags --- */
        .btn-tag-active { background: var(--accent); border-color: var(--accent); }
        .btn-tag-active:hover { background: #005ecb; }
        .tag-remove-cross { margin-left: 6px; opacity: 0.6; font-weight: bold; font-size: 11px; }
        .btn-tag-active:hover .tag-remove-cross { opacity: 1; color: #ffd1d1; }

        /* --- Custom Modal --- */
        #detection-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); }
        .modal-content { position: relative; background: var(--panel-bg); border: 1px solid var(--border); border-radius: 12px; padding: 25px; width: 90%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .detected-tags-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-height: 300px; overflow-y: auto; margin: 15px 0; padding-right: 10px; }
        .detected-tag-label { display: flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer; padding: 8px; border-radius: 6px; background: #1a1a1a; border: 1px solid #222; }
        .detected-tag-label:hover { background: #222; border-color: #333; }
        .detected-tag-label input[type="checkbox"] { cursor: pointer; width: 16px; height: 16px; accent-color: var(--accent); }

    </style>
</head>
<body>

    <div id="detection-modal" style="display: none;">
        <div class="modal-overlay" onclick="closeDetectionModal()"></div>
        <div class="modal-content">
            <h3 style="margin-top:0; margin-bottom:5px;">Detected New Tags</h3>
            <p style="font-size:13px; color:#aaa; margin-top:0;">Uncheck any tags you do not want to import:</p>
            <div id="detected-tags-list" class="detected-tags-grid"></div>
            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                <button class="btn" onclick="closeDetectionModal()">Cancel</button>
                <button class="btn btn-accent" onclick="importDetectedTags()">Import Selected</button>
            </div>
        </div>
    </div>

    <div id="left-sidebar" class="collapsed">
        <div class="panel-header">
            <span>Tag Manager</span>
            <button class="btn-icon" onclick="toggleTagsSidebar()">
                <svg class="icon" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
        </div>
        <div style="padding: 15px; border-bottom: 1px solid var(--border); display: flex; gap: 8px;">
            <input type="text" id="new-tag-input" placeholder="New tag..." onkeydown="if(event.key==='Enter') addTag()">
            <button class="btn btn-accent" onclick="addTag()">
                <svg class="icon icon-sm" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Add
            </button>
        </div>
        <ul id="tag-manager-list"></ul>
        <div class="panel-footer">
            <button class="btn" onclick="autoDetectTags()" title="Scans current folder for comma-separated tags">
                <svg class="icon icon-sm" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                Detect Tags from Files
            </button>
            <button class="btn" onclick="exportTags()">
                <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                Export Tags
            </button>
            <button class="btn" onclick="document.getElementById('import-file').click()">
                <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Import Tags
            </button>
            <input type="file" id="import-file" style="display:none" accept=".json" onchange="importTags(event)">
        </div>
    </div>

    <div id="main">
        <div id="top-bar">
            <button class="btn" onclick="toggleTagsSidebar()">
                <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
                Manage Tags
            </button>
            <button class="btn btn-danger" onclick="closeFolder()" title="Close current folder to open a new one">
                <svg class="icon icon-sm" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                Close Folder
            </button>
            <div style="flex:1"></div>
            <button id="init-btn" class="btn btn-accent">
                <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                Open Audio Folder
            </button>
        </div>
        
        <div id="workspace-content" style="display:none;">
            <div id="custom-player">
                <div id="current-title" style="text-align:center; margin-bottom:15px; font-weight:600;">Select a sound</div>
                <div id="progress-container"><div id="progress-bar"></div></div>
                <div class="time-info"><span id="time-current">0:00</span><span id="time-total">0:00</span></div>
                <div class="player-controls">
                    <button class="btn-icon" onclick="prevTrack()"><svg class="icon icon-lg fill-icon" viewBox="0 0 24 24"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor"></line></svg></button>
                    <button class="btn-icon" id="play-pause-btn" onclick="togglePlay()" style="color: white;"><svg class="icon icon-lg fill-icon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg></button>
                    <button class="btn-icon" onclick="nextTrack()"><svg class="icon icon-lg fill-icon" viewBox="0 0 24 24"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor"></line></svg></button>
                </div>
            </div>

            <div class="tag-grid" id="tag-buttons-workspace"></div>
            
            <div style="margin-top: 30px; display: flex; gap: 10px; justify-content: center;">
                <button class="btn" onclick="undo()" style="color:var(--danger)">
                    <svg class="icon icon-sm" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg> Undo Rename
                </button>
                <button class="btn" id="redo-btn" onclick="redo()" style="color:var(--success)">
                    <svg class="icon icon-sm" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg> Redo Rename
                </button>
            </div>
        </div>
    </div>

    <div id="right-sidebar">
        <div id="resizer"></div>
        <div class="panel-header">
            <span>File Explorer</span>
            <button class="btn-icon" id="toggle-folders-btn" onclick="toggleAllFolders()" title="Toggle Folders">
                <svg class="icon" viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"></polyline></svg>
            </button>
        </div>
        <div id="file-list-container"></div>
    </div>

    <audio id="audio-engine"></audio>

<script>
    const SVGs = {
        trash: `<svg class="icon icon-sm" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`,
        pencil: `<svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>`,
        folder: `<svg class="icon folder-icon" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>`,
        play: `<svg class="icon icon-lg fill-icon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>`,
        pause: `<svg class="icon icon-lg fill-icon" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>`,
        arrowUp: `<svg class="icon" viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"></polyline></svg>`,
        arrowDown: `<svg class="icon" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg>`,
        resume: `<svg class="icon icon-sm" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>`
    };

    function openDB() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.open('SFXManagerStore', 1);
            req.onupgradeneeded = (e) => e.target.result.createObjectStore('workspace');
            req.onsuccess = (e) => resolve(e.target.result);
            req.onerror = (e) => reject(e.target.error);
        });
    }

    async function saveDirectoryHandle(handle) {
        const db = await openDB();
        return new Promise(resolve => {
            const tx = db.transaction('workspace', 'readwrite');
            tx.objectStore('workspace').put(handle, 'savedDir');
            tx.oncomplete = () => resolve();
        });
    }

    async function loadDirectoryHandle() {
        const db = await openDB();
        return new Promise(resolve => {
            const tx = db.transaction('workspace', 'readonly');
            const req = tx.objectStore('workspace').get('savedDir');
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => resolve(null);
        });
    }

    async function closeFolder() {
        if(confirm("Disconnect from this folder? Your custom tags and settings will be saved.")) {
            const db = await openDB();
            const tx = db.transaction('workspace', 'readwrite');
            tx.objectStore('workspace').delete('savedDir');
            location.reload(); 
        }
    }

    async function verifyPermission(fileHandle) {
        const opts = { mode: 'readwrite' };
        if ((await fileHandle.queryPermission(opts)) === 'granted') return true;
        if ((await fileHandle.requestPermission(opts)) === 'granted') return true;
        return false;
    }

    // --- App State ---
    const DEFAULT_TAGS = ['Comedy', 'Tabla', 'Impact', 'Transition', 'Foley', 'Cinematic'];
    let tags = JSON.parse(localStorage.getItem('sfx_tags')) || DEFAULT_TAGS;
    let preservedCollapsed = new Set(JSON.parse(localStorage.getItem('sfx_collapsed_folders')) || []);
    
    let dirHandle, files = [], currentIndex = -1;
    let historyStack = [], redoStack = [];
    const audioEngine = document.getElementById('audio-engine');
    const progressBar = document.getElementById('progress-bar');
    const playPauseBtn = document.getElementById('play-pause-btn');

    // --- Boot Sequence ---
    window.onload = async () => {
        saveTags(); 
        
        const savedHandle = await loadDirectoryHandle();
        const initBtn = document.getElementById('init-btn');
        
        if (savedHandle) {
            initBtn.innerHTML = `${SVGs.resume} Resume Workspace`;
            initBtn.onclick = async () => {
                try {
                    if (await verifyPermission(savedHandle)) {
                        dirHandle = savedHandle;
                        initBtn.innerHTML = `Scanning...`; 
                        await scanDirectory(dirHandle);
                        initBtn.style.display = 'none';
                        document.getElementById('workspace-content').style.display = 'flex';
                        renderList();
                    }
                } catch(e) { console.error("Could not verify handle", e); }
            };
        } else {
            initBtn.onclick = async () => {
                try {
                    dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                    await saveDirectoryHandle(dirHandle);
                    
                    files = [];
                    initBtn.innerHTML = `Scanning...`; 
                    await scanDirectory(dirHandle);
                    
                    initBtn.style.display = 'none';
                    document.getElementById('workspace-content').style.display = 'flex';
                    renderList();
                } catch(e) { console.log("User aborted"); }
            };
        }
    }

    function saveCollapsedState() {
        preservedCollapsed.clear();
        document.querySelectorAll('.folder-item.collapsed').forEach(el => {
            if (el.dataset.path) preservedCollapsed.add(el.dataset.path);
        });
        localStorage.setItem('sfx_collapsed_folders', JSON.stringify([...preservedCollapsed]));
    }

    // --- Modal Detection Logic (Updated for Commas) ---
    function autoDetectTags() {
        if (files.length === 0) {
            alert("Please open an audio folder first.");
            return;
        }

        let newTags = new Set();
        
        files.forEach(f => {
            let name = f.name;
            if (name.includes(',')) {
                // Split by comma. The last element contains the base filename + extension, so we ignore it.
                let parts = name.split(',');
                for (let i = 0; i < parts.length - 1; i++) {
                    let clean = parts[i].trim();
                    if (clean && !tags.includes(clean)) {
                        newTags.add(clean);
                    }
                }
            }
        });

        if (newTags.size > 0) {
            const arr = Array.from(newTags).sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));
            const grid = document.getElementById('detected-tags-list');
            grid.innerHTML = '';
            
            arr.forEach((tag) => {
                const lbl = document.createElement('label');
                lbl.className = 'detected-tag-label';
                
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.value = tag;
                cb.checked = true;
                
                lbl.appendChild(cb);
                lbl.appendChild(document.createTextNode(tag));
                grid.appendChild(lbl);
            });
            
            document.getElementById('detection-modal').style.display = 'flex';
        } else {
            alert("No unknown comma-separated tags found.");
        }
    }

    function closeDetectionModal() {
        document.getElementById('detection-modal').style.display = 'none';
    }

    function importDetectedTags() {
        const checkboxes = document.querySelectorAll('#detected-tags-list input[type="checkbox"]:checked');
        const tagsToAdd = Array.from(checkboxes).map(cb => cb.value);
        
        if (tagsToAdd.length > 0) {
            tags.push(...tagsToAdd);
            saveTags(); 
            renderList(); 
        }
        closeDetectionModal();
    }

    // --- Tag Logic ---
    function saveTags() {
        tags.sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));
        localStorage.setItem('sfx_tags', JSON.stringify(tags));
        renderTagManager();
        renderWorkspaceTags();
    }
    
    function addTag() { const input = document.getElementById('new-tag-input'); const val = input.value.trim(); if (val && !tags.includes(val)) { tags.push(val); input.value = ''; saveTags(); } }
    function removeTag(index) { tags.splice(index, 1); saveTags(); }
    function updateTag(index, newVal) { if(newVal.trim()) { tags[index] = newVal.trim(); saveTags(); } }
    function exportTags() { const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(tags)); const anchor = document.createElement('a'); anchor.href = dataStr; anchor.download = "sfx_tags_preset.json"; anchor.click(); }
    
    function importTags(event) { 
        const file = event.target.files[0]; 
        if (!file) return; 
        const reader = new FileReader(); 
        reader.onload = (e) => { 
            try { 
                const imported = JSON.parse(e.target.result); 
                if (Array.isArray(imported)) { 
                    tags = imported; 
                    saveTags(); 
                    renderList(); 
                } 
            } catch (err) { alert("Error parsing JSON"); } 
        }; 
        reader.readAsText(file); 
        event.target.value = ''; 
    }

    function renderTagManager() {
        const list = document.getElementById('tag-manager-list');
        list.innerHTML = '';
        tags.forEach((tag, i) => {
            const li = document.createElement('li'); li.className = 'tag-edit-item';
            const input = document.createElement('input'); input.type = 'text'; input.value = tag; input.onchange = (e) => updateTag(i, e.target.value);
            const delBtn = document.createElement('button'); delBtn.className = 'btn-icon'; delBtn.innerHTML = SVGs.trash; delBtn.onclick = () => removeTag(i);
            li.appendChild(input); li.appendChild(delBtn); list.appendChild(li);
        });
    }

    function toggleTagsSidebar() { document.getElementById('left-sidebar').classList.toggle('collapsed'); }

    // --- UI Utilities ---
    const rightSidebar = document.getElementById('right-sidebar');
    const resizer = document.getElementById('resizer');
    resizer.addEventListener('mousedown', () => { document.addEventListener('mousemove', resize); document.addEventListener('mouseup', stopResize); });
    function resize(e) { let newWidth = window.innerWidth - e.pageX; if (newWidth > 250 && newWidth < 700) rightSidebar.style.width = newWidth + 'px'; }
    function stopResize() { document.removeEventListener('mousemove', resize); }

    let isFoldersExpanded = true;
    function toggleAllFolders() {
        isFoldersExpanded = !isFoldersExpanded;
        const btn = document.getElementById('toggle-folders-btn');
        btn.innerHTML = isFoldersExpanded ? SVGs.arrowUp : SVGs.arrowDown;
        
        document.querySelectorAll('.folder-item').forEach(item => {
            if (isFoldersExpanded) item.classList.remove('collapsed');
            else item.classList.add('collapsed');
        });
        saveCollapsedState();
    }

    // --- SMART Filename Extraction Engine ---
    function extractTagsFromName(filename, knownTags) {
        let activeTags = [];
        let baseName = filename;
        let parsing = true;

        const sortedTags = [...knownTags].sort((a, b) => b.length - a.length);

        while(parsing) {
            parsing = false;
            for (let tag of sortedTags) {
                if (baseName.startsWith(tag)) {
                    const afterTag = baseName.substring(tag.length);
                    if (afterTag.startsWith('_') || afterTag.startsWith(',') || afterTag.startsWith(' ') || afterTag.startsWith('.')) {
                        activeTags.push(tag);
                        baseName = afterTag;
                        
                        while(baseName.startsWith('_') || baseName.startsWith(',') || baseName.startsWith(' ')) {
                            baseName = baseName.substring(1);
                        }
                        parsing = true; 
                        break; 
                    }
                }
            }
        }
        return { activeTags, baseName };
    }

    // --- Dynamic Workspace Tags (Updated for Commas) ---
    function renderWorkspaceTags() {
        const grid = document.getElementById('tag-buttons-workspace');
        grid.innerHTML = '';

        let activeTags = [];
        let baseName = "";
        
        if (currentIndex > -1 && files[currentIndex]) {
            const extraction = extractTagsFromName(files[currentIndex].name, tags);
            activeTags = extraction.activeTags;
            baseName = extraction.baseName;
        }

        tags.forEach(tag => {
            const b = document.createElement('button');
            b.className = 'btn';

            if (activeTags.includes(tag)) {
                b.classList.add('btn-tag-active');
                b.innerHTML = `${tag} <span class="tag-remove-cross">✖</span>`;
                b.onclick = () => {
                    const newActiveTags = [...activeTags];
                    const tagIndex = newActiveTags.indexOf(tag);
                    if(tagIndex > -1) newActiveTags.splice(tagIndex, 1);
                    
                    // Rewrite with strictly comma + space
                    const newPrefix = newActiveTags.length > 0 ? newActiveTags.join(', ') + ', ' : '';
                    const newName = newPrefix + baseName;
                    executeRename(currentIndex, newName);
                };
            } else {
                b.innerText = tag;
                b.onclick = () => {
                    // Append new tag using comma + space
                    const allTags = [...activeTags, tag];
                    const newPrefix = allTags.join(', ') + ', ';
                    const newName = newPrefix + baseName;
                    executeRename(currentIndex, newName);
                };
            }
            grid.appendChild(b);
        });
    }

    // --- File Scanning & Rendering ---
    async function scanDirectory(directoryHandle, currentPath = '') {
        for await (const entry of directoryHandle.values()) {
            if (entry.kind === 'file' && /\.(wav|mp3|m4a|ogg)$/i.test(entry.name)) {
                files.push({ handle: entry, name: entry.name, originalName: entry.name, path: currentPath });
            } else if (entry.kind === 'directory') {
                if (!entry.name.startsWith('.')) {
                    const newPath = currentPath ? `${currentPath}/${entry.name}` : entry.name;
                    await scanDirectory(entry, newPath);
                }
            }
        }
    }

    function renderList() {
        const container = document.getElementById('file-list-container');
        saveCollapsedState(); 

        const activeFile = currentIndex > -1 ? files[currentIndex] : null;
        container.innerHTML = '';
        
        const treeData = {};
        files.forEach((file) => {
            const parts = file.path ? file.path.split('/') : [];
            let currentLevel = treeData;
            parts.forEach(part => {
                if (!currentLevel[part]) currentLevel[part] = { _isDir: true, _children: {} };
                currentLevel = currentLevel[part]._children;
            });
            currentLevel[file.name] = file;
        });

        const newSortedFiles = [];

        function buildHTMLTree(node, parentElement, pathPrefix = '') {
            const ul = document.createElement('ul'); ul.className = 'tree-list';
            
            const keys = Object.keys(node).sort((a, b) => {
                if (node[a]._isDir && !node[b]._isDir) return -1;
                if (!node[a]._isDir && node[b]._isDir) return 1;
                return a.localeCompare(b);
            });

            keys.forEach(key => {
                const item = node[key];
                const li = document.createElement('li');
                
                if (item._isDir) {
                    const folderPath = pathPrefix ? `${pathPrefix}/${key}` : key;
                    const shouldCollapse = preservedCollapsed.has(folderPath);
                    
                    li.className = `folder-item ${shouldCollapse ? 'collapsed' : ''}`;
                    li.dataset.path = folderPath; 

                    const folderTitle = document.createElement('div');
                    folderTitle.className = 'folder-title';
                    folderTitle.innerHTML = `${SVGs.folder} <span>${key}</span>`;
                    folderTitle.onclick = (e) => { e.stopPropagation(); li.classList.toggle('collapsed'); saveCollapsedState(); };
                    
                    const folderContents = document.createElement('div');
                    folderContents.className = 'folder-contents';
                    
                    li.appendChild(folderTitle);
                    buildHTMLTree(item._children, folderContents, folderPath);
                    li.appendChild(folderContents);
                } else {
                    newSortedFiles.push(item);
                    item.index = newSortedFiles.length - 1;

                    li.className = `file-item ${item === activeFile ? 'active' : ''}`;
                    if (item.name !== item.originalName) li.classList.add('renamed');
                    
                    li.dataset.index = item.index; 
                    li.onclick = () => loadTrack(item.index);

                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'file-name';
                    nameSpan.innerText = item.name;

                    const editBtn = document.createElement('button');
                    editBtn.className = 'btn-icon';
                    editBtn.innerHTML = SVGs.pencil;
                    
                    editBtn.onclick = (e) => {
                        e.stopPropagation();
                        const input = document.createElement('input');
                        input.type = 'text'; input.className = 'rename-input'; input.value = item.name;
                        
                        input.onkeydown = (ev) => {
                            if (ev.key === 'Enter') executeRename(item.index, input.value);
                            else if (ev.key === 'Escape') renderList();
                        };
                        
                        li.innerHTML = ''; li.appendChild(input); input.focus();
                        const dotIndex = item.name.lastIndexOf('.');
                        input.setSelectionRange(0, dotIndex > -1 ? dotIndex : item.name.length);
                    };

                    li.appendChild(nameSpan);
                    li.appendChild(editBtn);
                }
                ul.appendChild(li);
            });
            parentElement.appendChild(ul);
        }
        
        buildHTMLTree(treeData, container, '');

        files = newSortedFiles;
        if (activeFile) currentIndex = files.findIndex(f => f === activeFile);
        
        renderWorkspaceTags(); 
    }

    // --- Audio Control ---
    async function loadTrack(index) {
        if (index < 0 || index >= files.length) return;
        const wasPlaying = audioEngine.src ? !audioEngine.paused : false;

        currentIndex = index;
        const f = files[currentIndex];
        document.getElementById('current-title').innerText = f.name;
        
        const fileData = await f.handle.getFile();
        audioEngine.src = URL.createObjectURL(fileData);
        
        if (wasPlaying) { audioEngine.play(); playPauseBtn.innerHTML = SVGs.pause; } 
        else { audioEngine.pause(); playPauseBtn.innerHTML = SVGs.play; }

        progressBar.style.width = '0%'; document.getElementById('time-current').innerText = '0:00';
        
        if (f.path) {
            const parts = f.path.split('/');
            let incrementalPath = '';
            parts.forEach(p => {
                if(!p) return;
                incrementalPath = incrementalPath ? `${incrementalPath}/${p}` : p;
                const safePath = incrementalPath.replace(/"/g, '\\"');
                const folder = document.querySelector(`.folder-item[data-path="${safePath}"]`);
                if (folder) folder.classList.remove('collapsed');
            });
            saveCollapsedState();
        }

        document.querySelectorAll('.file-item.active').forEach(el => el.classList.remove('active'));
        const newActive = document.querySelector(`.file-item[data-index="${currentIndex}"]`);
        if (newActive) {
            newActive.classList.add('active');
            newActive.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        renderWorkspaceTags(); 
    }

    function togglePlay() {
        if (audioEngine.paused) { audioEngine.play(); playPauseBtn.innerHTML = SVGs.pause; }
        else { audioEngine.pause(); playPauseBtn.innerHTML = SVGs.play; }
    }

    audioEngine.ontimeupdate = () => {
        const pct = (audioEngine.currentTime / audioEngine.duration) * 100;
        progressBar.style.width = pct + '%';
        document.getElementById('time-current').innerText = formatTime(audioEngine.currentTime);
        document.getElementById('time-total').innerText = formatTime(audioEngine.duration);
    };

    function formatTime(s) { if (isNaN(s)) return "0:00"; const m = Math.floor(s / 60); const sec = Math.floor(s % 60); return `${m}:${sec < 10 ? '0' : ''}${sec}`; }
    function nextTrack() { loadTrack(currentIndex + 1); }
    function prevTrack() { loadTrack(currentIndex - 1); }

    document.getElementById('progress-container').onclick = (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        audioEngine.currentTime = ((e.clientX - rect.left) / rect.width) * audioEngine.duration;
    };

    // --- Renaming Execution ---
    async function applyTag(tag) {
        if (currentIndex === -1) return;
        const f = files[currentIndex];
        await executeRename(currentIndex, `${tag}_${f.name}`);
    }

    async function executeRename(index, newName) {
        const f = files[index];
        const oldName = f.name;
        if (newName === oldName || !newName.trim()) { renderList(); return; }
        
        try {
            await f.handle.move(newName);
            historyStack.push({ file: f, oldName, newName });
            redoStack = []; 
            f.name = newName;
            
            if (currentIndex === index) document.getElementById('current-title').innerText = newName;
            renderList(); 
        } catch (e) { alert("Error renaming. Ensure the file isn't open in another app."); renderList(); }
    }

    async function undo() {
        if (!historyStack.length) return;
        const act = historyStack.pop();
        await act.file.handle.move(act.oldName);
        redoStack.push(act);
        act.file.name = act.oldName;
        
        if (files[currentIndex] === act.file) document.getElementById('current-title').innerText = act.oldName;
        renderList();
    }

    async function redo() {
        if (!redoStack.length) return;
        const act = redoStack.pop();
        await act.file.handle.move(act.newName);
        historyStack.push(act);
        act.file.name = act.newName;
        
        if (files[currentIndex] === act.file) document.getElementById('current-title').innerText = act.newName;
        renderList();
    }
</script>
