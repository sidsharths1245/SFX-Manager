<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flow State SFX Manager Pro</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --panel-bg: #141414;
            --accent: #007aff;
            --text: #e0e0e0;
            --border: #282828;
            --input-bg: #1e1e1e;
            --danger: #ff453a;
            --success: #32d74b;
            --icon-color: #888;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* --- Global SVG Icon Styles --- */
        .icon { width: 16px; height: 16px; min-width: 16px; min-height: 16px; max-width: 16px; max-height: 16px; flex-shrink: 0; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; display: inline-block; }
        .icon-sm { width: 14px; height: 14px; min-width: 14px; min-height: 14px; max-width: 14px; max-height: 14px; }
        .icon-lg { width: 24px; height: 24px; min-width: 24px; min-height: 24px; max-width: 24px; max-height: 24px; }
        .fill-icon { fill: currentColor; stroke: none; }

        /* --- Panel Layout Ordering --- */
        #file-sidebar { order: 1; min-width: 250px; width: 400px; max-width: 700px; background: var(--panel-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: relative; }
        #main { order: 2; flex: 1; display: flex; flex-direction: column; position: relative; }
        #tag-sidebar { order: 3; width: 280px; background: var(--panel-bg); border-left: 1px solid var(--border); display: flex; flex-direction: column; transition: width 0.3s ease, min-width 0.3s ease; overflow: hidden; white-space: nowrap; }

        /* --- Tag Sidebar Specifics --- */
        #tag-sidebar.collapsed { width: 0; min-width: 0; border-left: none; }
        .panel-header { padding: 15px; font-weight: bold; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        #tag-manager-list { flex: 1; overflow-y: auto; padding: 15px; list-style: none; margin: 0; }
        .tag-edit-item { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
        .tag-edit-item input { flex: 1; min-width: 0; }
        .panel-footer { padding: 15px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
        
        /* --- Workspace Specifics --- */
        #top-bar { padding: 15px; display: flex; border-bottom: 1px solid var(--border); align-items: center; gap: 10px;}
        #workspace-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; overflow-y: auto; }

        /* --- File Explorer Specifics --- */
        #resizer { width: 4px; cursor: col-resize; background: transparent; position: absolute; right: -2px; top: 0; bottom: 0; z-index: 10; }
        #resizer:hover { background: var(--accent); }
        
        /* Custom Search Box */
        .search-box { display: flex; align-items: center; background: var(--input-bg); border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; transition: 0.2s; }
        .search-box:focus-within { border-color: var(--accent); }
        .search-box input { border: none !important; background: transparent; width: 100%; color: white; outline: none; padding-left: 8px; font-size: 13px; }

        /* Dropdown Filter Menu */
        .dropdown-menu { position: absolute; top: 35px; right: 0; background: #1a1a1a; border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.7); display: none; flex-direction: column; z-index: 100; overflow: hidden; width: 160px; }
        .dropdown-menu button { background: transparent; border: none; color: var(--text); padding: 12px 15px; text-align: left; cursor: pointer; font-size: 13px; font-weight: 500; transition: 0.2s; }
        .dropdown-menu button:hover { background: #2a2a2a; color: white; }
        .dropdown-menu button.active { color: var(--accent); background: rgba(0, 122, 255, 0.1); border-left: 3px solid var(--accent); padding-left: 12px; }

        #file-list-container { flex: 1; overflow-y: auto; padding: 10px 0; min-height: 100px; }
        .tree-list { list-style: none; padding-left: 15px; margin: 0; }
        #file-list-container > .tree-list { padding-left: 0; } 
        
        .folder-item { margin: 2px 0; }
        .folder-title { padding: 8px 15px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: #aaa; transition: 0.2s; border-radius: 6px; margin: 0 4px; }
        .folder-title:hover { background: #1e1e1e; color: white; }
        .folder-title.drag-over { background: rgba(0, 122, 255, 0.3); outline: 1px dashed var(--accent); color: white; }
        .folder-icon { color: var(--accent); transition: 0.2s; }
        .folder-item.collapsed .folder-icon { color: var(--icon-color); }
        .folder-contents { overflow: hidden; }
        .folder-item.collapsed .folder-contents { display: none; }
        
        /* Updated File Items Style */
        .file-item { padding: 8px 15px; border-bottom: 1px solid #222; display: flex; align-items: flex-start; gap: 10px; cursor: pointer; transition: 0.15s; border-radius: 6px; margin: 2px 8px; }
        .file-item:hover { background: #1a1a1a; }
        .file-item .btn-icon { margin-top: -2px; } 
        .file-name { font-size: 13px; display: flex; align-items: flex-start; flex-wrap: wrap; gap: 8px; word-break: break-word; white-space: normal; line-height: 1.4; pointer-events: none; }
        .file-item input.rename-input { flex: 1; pointer-events: auto; }
        
        /* Multi-Select & Renamed Backgrounds */
        .file-item.renamed { background: rgba(50, 215, 75, 0.10); border-bottom: none; }
        .file-item.renamed:hover { background: rgba(50, 215, 75, 0.20); }
        .file-item.active { background: rgba(0, 122, 255, 0.25) !important; border-bottom: none; }

        /* --- Custom Player --- */
        #custom-player { width: 100%; max-width: 600px; background: #1a1a1a; padding: 20px; border-radius: 12px; margin-bottom: 30px; }
        .player-controls { display: flex; align-items: center; justify-content: center; gap: 20px; margin-top: 15px; }
        #progress-container { width: 100%; height: 6px; background: #333; border-radius: 3px; cursor: pointer; position: relative; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); border-radius: 3px; pointer-events: none; transition: width 0.1s linear; }
        .time-info { display: flex; justify-content: space-between; font-size: 11px; margin-top: 5px; color: var(--icon-color); }

        /* --- Inputs & Buttons --- */
        input[type="text"] { background: var(--input-bg); border: 1px solid var(--border); color: white; padding: 6px 10px; border-radius: 4px; font-size: 13px; outline: none; }
        input[type="text"]:focus { border-color: var(--accent); }
        .btn { display: flex; align-items: center; justify-content: center; gap: 8px; background: #2a2a2a; color: white; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .btn:hover { background: #3a3a3a; }
        .btn-accent { background: var(--accent); }
        .btn-accent:hover { background: #005ecb; }
        .btn-danger { color: var(--danger); }
        .btn-danger:hover { background: rgba(255, 69, 58, 0.1); }
        .btn-icon { background: transparent; border: none; color: var(--icon-color); cursor: pointer; padding: 6px; border-radius: 4px; transition: 0.2s; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .btn-icon:hover { color: white; background: rgba(255,255,255,0.05); }
        .tag-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; width: 100%; max-width: 600px; }

        /* --- Active Workspace Tags --- */
        .btn-tag-active { background: var(--accent); border-color: var(--accent); }
        .btn-tag-active:hover { background: #005ecb; }
        .tag-remove-cross { margin-left: 6px; opacity: 0.6; font-weight: bold; font-size: 11px; }
        .btn-tag-active:hover .tag-remove-cross { opacity: 1; color: #ffd1d1; }

        /* --- Custom Modal --- */
        #detection-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); }
        .modal-content { position: relative; background: var(--panel-bg); border: 1px solid var(--border); border-radius: 12px; padding: 25px; width: 90%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .detected-tags-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-height: 300px; overflow-y: auto; margin: 15px 0; padding-right: 10px; }
        .detected-tag-label { display: flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer; padding: 8px; border-radius: 6px; background: #1a1a1a; border: 1px solid #222; }
        .detected-tag-label:hover { background: #222; border-color: #333; }
        .detected-tag-label input[type="checkbox"] { cursor: pointer; width: 16px; height: 16px; accent-color: var(--accent); }

    </style>
</head>
<body>

    <div id="detection-modal" style="display: none;">
        <div class="modal-overlay" onclick="closeDetectionModal()"></div>
        <div class="modal-content">
            <h3 style="margin-top:0; margin-bottom:5px;">Detected New Tags</h3>
            <p style="font-size:13px; color:#aaa; margin-top:0;">Uncheck any tags you do not want to import:</p>
            <div id="detected-tags-list" class="detected-tags-grid"></div>
            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                <button class="btn" onclick="closeDetectionModal()">Cancel</button>
                <button class="btn btn-accent" onclick="importDetectedTags()">Import Selected</button>
            </div>
        </div>
    </div>

    <div id="file-sidebar">
        <div id="resizer"></div>
        <div class="panel-header" style="flex-direction: column; align-items: stretch; gap: 10px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span>File Explorer</span>
                <div style="display: flex; gap: 5px; position: relative;">
                    <button class="btn-icon" id="filter-btn" onclick="toggleFilterMenu()" title="Filter">
                        <svg class="icon icon-sm" viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
                    </button>
                    <div id="filter-dropdown" class="dropdown-menu">
                        <button onclick="applyFilter(0)" id="flt-0" class="active">All Files</button>
                        <button onclick="applyFilter(1)" id="flt-1">Edited (Session)</button>
                        <button onclick="applyFilter(2)" id="flt-2">Unedited (Session)</button>
                    </div>
                    <button class="btn-icon" id="toggle-folders-btn" onclick="toggleAllFolders()" title="Toggle Folders">
                        <svg class="icon" viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"></polyline></svg>
                    </button>
                </div>
            </div>
            <div class="search-box">
                <svg class="icon icon-sm" style="color: var(--icon-color);" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="file-search-input" placeholder="Search files..." oninput="handleSearch()">
            </div>
        </div>
        <div id="file-list-container"></div>
    </div>

    <div id="main">
        <div id="top-bar">
            <button id="close-folder-btn" class="btn btn-danger" onclick="closeFolder()" title="Close current folder to open a new one" style="display: none;">
                <svg class="icon icon-sm" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                Close Folder
            </button>
            <button id="init-btn" class="btn btn-accent" style="display: none;">
                <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                Open Audio Folder
            </button>
            <div style="flex:1"></div>
            <button class="btn" onclick="toggleTagsSidebar()">
                <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
                Manage Tags
            </button>
        </div>
        
        <div id="workspace-content" style="display:none;">
            <div id="custom-player">
                <div id="current-title" style="text-align:center; margin-bottom:15px; font-weight:600; word-break: break-word; line-height: 1.4;">Select a sound</div>
                <div id="progress-container"><div id="progress-bar"></div></div>
                <div class="time-info"><span id="time-current">0:00</span><span id="time-total">0:00</span></div>
                <div class="player-controls">
                    <button class="btn-icon" onclick="prevTrack()" title="Previous (Up Arrow)"><svg class="icon icon-lg fill-icon" viewBox="0 0 24 24"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor"></line></svg></button>
                    <button class="btn-icon" id="play-pause-btn" onclick="togglePlay()" style="color: white;" title="Play/Pause (Space)"><svg class="icon icon-lg fill-icon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg></button>
                    <button class="btn-icon" onclick="nextTrack()" title="Next (Down Arrow)"><svg class="icon icon-lg fill-icon" viewBox="0 0 24 24"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor"></line></svg></button>
                </div>
            </div>

            <div class="tag-grid" id="tag-buttons-workspace"></div>
            
            <div style="margin-top: 30px; display: flex; gap: 10px; justify-content: center;">
                <button class="btn" onclick="undo()" style="color:var(--danger)" title="Undo (Cmd/Ctrl + Z)">
                    <svg class="icon icon-sm" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg> Undo Action
                </button>
                <button class="btn" id="redo-btn" onclick="redo()" style="color:var(--success)" title="Redo (Cmd/Ctrl + Shift + Z)">
                    <svg class="icon icon-sm" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg> Redo Action
                </button>
            </div>
        </div>
    </div>

    <div id="tag-sidebar" class="collapsed">
        <script>
            if (JSON.parse(localStorage.getItem('sfx_tag_sidebar_collapsed') ?? 'true') === false) {
                document.getElementById('tag-sidebar').classList.remove('collapsed');
            }
        </script>
        
        <div class="panel-header">
            <span>Tag Manager</span>
            <button class="btn-icon" onclick="toggleTagsSidebar()">
                <svg class="icon" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
        </div>
        <div style="padding: 15px; border-bottom: 1px solid var(--border); display: flex; gap: 8px;">
            <input type="text" id="new-tag-input" placeholder="New tag..." onkeydown="if(event.key==='Enter') addTag()">
            <button class="btn btn-accent" onclick="addTag()">
                <svg class="icon icon-sm" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Add
            </button>
        </div>
        <ul id="tag-manager-list"></ul>
        <div class="panel-footer">
            <button class="btn" onclick="autoDetectTags()" title="Scans folder for delimited tags">
                <svg class="icon icon-sm" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                Detect Tags from Files
            </button>
            <button class="btn" onclick="exportTags()">
                <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                Export Tags
            </button>
            <button class="btn" onclick="document.getElementById('import-file').click()">
                <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Import Tags
            </button>
            <input type="file" id="import-file" style="display:none" accept=".json" onchange="importTags(event)">
        </div>
    </div>

    <audio id="audio-engine"></audio>

<script>
    const SVGs = {
        trash: `<svg class="icon icon-sm" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`,
        pencil: `<svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>`,
        folder: `<svg class="icon folder-icon" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>`,
        play: `<svg class="icon icon-lg fill-icon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>`,
        pause: `<svg class="icon icon-lg fill-icon" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>`,
        arrowUp: `<svg class="icon" viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"></polyline></svg>`,
        arrowDown: `<svg class="icon" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg>`,
        resume: `<svg class="icon icon-sm" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>`
    };

    function generateId() { return Math.random().toString(36).substr(2, 9); }
    function getFullPath(path, name) { return path ? `${path}/${name}` : name; }

    // --- Warn before closing the tab ---
    window.addEventListener('beforeunload', (e) => {
        if (allFiles.length > 0) {
            e.preventDefault();
            e.returnValue = '';
        }
    });

    function openDB() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.open('SFXManagerStore', 1);
            req.onupgradeneeded = (e) => e.target.result.createObjectStore('workspace');
            req.onsuccess = (e) => resolve(e.target.result);
            req.onerror = (e) => reject(e.target.error);
        });
    }

    async function saveDirectoryHandle(handle) {
        const db = await openDB();
        return new Promise(resolve => {
            const tx = db.transaction('workspace', 'readwrite');
            tx.objectStore('workspace').put(handle, 'savedDir');
            tx.oncomplete = () => resolve();
        });
    }

    async function loadDirectoryHandle() {
        const db = await openDB();
        return new Promise(resolve => {
            const tx = db.transaction('workspace', 'readonly');
            const req = tx.objectStore('workspace').get('savedDir');
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => resolve(null);
        });
    }

    async function closeFolder() {
        if(confirm("Disconnect from this folder? Your custom tags and settings will be saved.")) {
            const db = await openDB();
            const tx = db.transaction('workspace', 'readwrite');
            tx.objectStore('workspace').delete('savedDir');
            location.reload(); 
        }
    }

    async function verifyPermission(fileHandle) {
        const opts = { mode: 'readwrite' };
        if ((await fileHandle.queryPermission(opts)) === 'granted') return true;
        if ((await fileHandle.requestPermission(opts)) === 'granted') return true;
        return false;
    }

    // --- App State ---
    const DEFAULT_TAGS = ['Comedy', 'Tabla', 'Impact', 'Transition', 'Foley', 'Cinematic'];
    let tags = JSON.parse(localStorage.getItem('sfx_tags')) || DEFAULT_TAGS;
    let savedSearchQuery = localStorage.getItem('sfx_search_query') || '';
    let savedSidebarWidth = localStorage.getItem('sfx_sidebar_width') || '400';
    let lastSelectedTrack = JSON.parse(localStorage.getItem('sfx_last_selected_track') || 'null');
    
    let isFoldersExpanded = JSON.parse(localStorage.getItem('sfx_global_folders_expanded') ?? 'true');
    let folderStates = JSON.parse(localStorage.getItem('sfx_folder_states') || '{}');
    
    // Persistent Session Original States Map { "current/full/path.wav": { originalName, originalPath } }
    let originalFileStates = JSON.parse(sessionStorage.getItem('sfx_original_states') || '{}');
    
    let dirHandle;
    let dirHandles = {}; 
    let allFiles = []; 
    let files = []; 
    let searchResults = null; 
    let currentIndex = -1;
    let historyStack = [], redoStack = [];

    // Filter Logic
    let filterState = parseInt(sessionStorage.getItem('sfx_filter_state') || '0'); 
    let activeFilterFiles = new Set(); // Cached snapshot of files for Flat List views

    // Selection State
    let selectedIds = new Set();
    let lastClickedId = null;
    
    const audioEngine = document.getElementById('audio-engine');
    const progressBar = document.getElementById('progress-bar');
    const playPauseBtn = document.getElementById('play-pause-btn');

    // --- Global Keyboard Shortcuts ---
    document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

        if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
        else if (e.code === 'ArrowDown') { e.preventDefault(); nextTrack(); }
        else if (e.code === 'ArrowUp') { e.preventDefault(); prevTrack(); }
        else if (e.code === 'ArrowRight') { e.preventDefault(); scrub(5); }
        else if (e.code === 'ArrowLeft') { e.preventDefault(); scrub(-5); }
        else if (e.code === 'Escape') { 
            e.preventDefault(); 
            selectedIds.clear(); 
            lastClickedId = null;
            document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
            renderWorkspaceTags();
        }
        else if (e.code === 'KeyZ' && (e.metaKey || e.ctrlKey) && !e.shiftKey) { e.preventDefault(); undo(); }
        else if ((e.code === 'KeyZ' && (e.metaKey || e.ctrlKey) && e.shiftKey) || (e.code === 'KeyY' && (e.metaKey || e.ctrlKey))) { e.preventDefault(); redo(); }
    });

    // Close Dropdown if clicked outside
    document.addEventListener('click', (e) => {
        if (!e.target.closest('#filter-btn') && !e.target.closest('#filter-dropdown')) {
            document.getElementById('filter-dropdown').style.display = 'none';
        }
    });

    function scrub(seconds) {
        if (!audioEngine.src || isNaN(audioEngine.duration)) return;
        let newTime = audioEngine.currentTime + seconds;
        newTime = Math.max(0, Math.min(newTime, audioEngine.duration));
        audioEngine.currentTime = newTime;
    }

    function restoreLastTrack() {
        if (lastSelectedTrack && files.length > 0) {
            const foundIndex = files.findIndex(f => f.name === lastSelectedTrack.name && f.path === lastSelectedTrack.path);
            if (foundIndex > -1) {
                const fileObj = files[foundIndex];
                selectedIds.add(fileObj.id);
                lastClickedId = fileObj.id;
                
                // Ensure UI is visually updated
                document.querySelectorAll('.file-item').forEach(el => {
                    if (selectedIds.has(el.dataset.id)) el.classList.add('active');
                });
                
                loadTrack(foundIndex);
            }
        }
    }

    // --- State Mapping Logic ---
    function updateOriginalStateMap(oldPath, oldName, newPath, newName, fileObj) {
        const oldFull = getFullPath(oldPath, oldName);
        const newFull = getFullPath(newPath, newName);
        
        let orig = originalFileStates[oldFull] || { name: fileObj.originalName, path: fileObj.originalPath };
        delete originalFileStates[oldFull];
        
        // If restored completely to initial scan state, erase from map
        if (orig.name === newName && orig.path === newPath) {
             // File is unedited again
        } else {
            originalFileStates[newFull] = orig;
        }
        
        sessionStorage.setItem('sfx_original_states', JSON.stringify(originalFileStates));
        
        fileObj.originalName = orig.name;
        fileObj.originalPath = orig.path;
    }


    // --- Boot Sequence ---
    window.onload = async () => {
        saveTags(); 
        
        const fileSidebar = document.getElementById('file-sidebar');
        fileSidebar.style.width = savedSidebarWidth + 'px';
        const searchInput = document.getElementById('file-search-input');

        const savedHandle = await loadDirectoryHandle();
        const initBtn = document.getElementById('init-btn');
        const closeBtn = document.getElementById('close-folder-btn');
        
        if (savedHandle) {
            const permStatus = await savedHandle.queryPermission({ mode: 'readwrite' });
            if (permStatus === 'granted') {
                dirHandle = savedHandle;
                closeBtn.style.display = 'flex';
                document.getElementById('workspace-content').style.display = 'flex';
                document.getElementById('file-list-container').innerHTML = '<div style="padding:20px; color:#888;">Auto-resuming workspace...</div>';
                
                allFiles = []; searchResults = null; dirHandles = {};
                await scanDirectory(dirHandle);
                applyFilter(filterState); // Will auto renderList
                restoreLastTrack();
            } else {
                initBtn.style.display = 'flex';
                initBtn.innerHTML = `${SVGs.resume} Resume Workspace`;
                initBtn.onclick = async () => {
                    try {
                        if (await verifyPermission(savedHandle)) {
                            dirHandle = savedHandle;
                            initBtn.innerHTML = `Scanning...`; 
                            allFiles = []; searchResults = null; dirHandles = {};
                            await scanDirectory(dirHandle);
                            initBtn.style.display = 'none'; closeBtn.style.display = 'flex';
                            document.getElementById('workspace-content').style.display = 'flex';
                            applyFilter(filterState);
                            restoreLastTrack();
                        }
                    } catch(e) { console.error("Could not verify handle", e); }
                };
            }
        } else {
            initBtn.style.display = 'flex';
            initBtn.onclick = async () => {
                try {
                    dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });

                    await scanDirectory(dirHandle);
                    initBtn.style.display = 'none'; closeBtn.style.display = 'flex';
                    document.getElementById('workspace-content').style.display = 'flex';
                    applyFilter(filterState); 
                    restoreLastTrack();
                } catch(e) { console.log("User aborted"); }
            };
        }
    }

    // --- File Scanning & Dir Caching ---
    async function scanDirectory(directoryHandle, currentPath = '') {
        if (currentPath === '') dirHandles[''] = directoryHandle;

        for await (const entry of directoryHandle.values()) {
            if (entry.kind === 'file' && /\.(wav|mp3|m4a|ogg)$/i.test(entry.name)) {
                
                // Read from persistent session storage in case it was edited and we refreshed
                const fullPath = getFullPath(currentPath, entry.name);
                const origData = originalFileStates[fullPath];

                allFiles.push({ 
                    id: generateId(),
                    handle: entry, 
                    name: entry.name, 
                    originalName: origData ? origData.name : entry.name, 
                    path: currentPath,
                    originalPath: origData ? origData.path : currentPath
                });
            } else if (entry.kind === 'directory') {
                if (!entry.name.startsWith('.')) {
                    const newPath = currentPath ? `${currentPath}/${entry.name}` : entry.name;
                    dirHandles[newPath] = entry;
                    await scanDirectory(entry, newPath);
                }
            }
        }
    }

    // --- Modal Detection Logic ---
    function autoDetectTags() {
        if (allFiles.length === 0) { alert("Please open an audio folder first."); return; }

        let newTags = new Set();
        allFiles.forEach(f => {
            let name = f.name;
            let nameWithoutExt = name.includes('.') ? name.substring(0, name.lastIndexOf('.')) : name;
            
            if (nameWithoutExt.match(/[,_]/)) {
                let parts = nameWithoutExt.split(/[,_]+/);
                if (parts.length > 1) {
                    for (let i = 0; i < parts.length - 1; i++) {
                        let clean = parts[i].trim();
                        if (clean && !tags.includes(clean)) newTags.add(clean);
                    }
                }
            }
        });

        if (newTags.size > 0) {
            const arr = Array.from(newTags).sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));
            const grid = document.getElementById('detected-tags-list');
            grid.innerHTML = '';
            
            arr.forEach((tag) => {
                const lbl = document.createElement('label'); lbl.className = 'detected-tag-label';
                const cb = document.createElement('input'); cb.type = 'checkbox'; cb.value = tag; cb.checked = true;
                lbl.appendChild(cb); lbl.appendChild(document.createTextNode(tag)); grid.appendChild(lbl);
            });
            document.getElementById('detection-modal').style.display = 'flex';
        } else { alert("No unknown tags found."); }
    }

    function closeDetectionModal() { document.getElementById('detection-modal').style.display = 'none'; }
    function importDetectedTags() {
        const checkboxes = document.querySelectorAll('#detected-tags-list input[type="checkbox"]:checked');
        const tagsToAdd = Array.from(checkboxes).map(cb => cb.value);
        if (tagsToAdd.length > 0) { tags.push(...tagsToAdd); saveTags(); renderList(); }
        closeDetectionModal();
    }

    // --- Tag Logic ---
    function saveTags() {
        tags.sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));
        localStorage.setItem('sfx_tags', JSON.stringify(tags));
        renderTagManager();
        renderWorkspaceTags();
    }
    
    function addTag() { const input = document.getElementById('new-tag-input'); const val = input.value.trim(); if (val && !tags.includes(val)) { tags.push(val); input.value = ''; saveTags(); } }
    function removeTag(index) { tags.splice(index, 1); saveTags(); }
    function updateTag(index, newVal) { if(newVal.trim()) { tags[index] = newVal.trim(); saveTags(); } }
    function exportTags() { const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(tags)); const anchor = document.createElement('a'); anchor.href = dataStr; anchor.download = "sfx_tags_preset.json"; anchor.click(); }
    function importTags(event) { 
        const file = event.target.files[0]; if (!file) return; 
        const reader = new FileReader(); 
        reader.onload = (e) => { try { const imported = JSON.parse(e.target.result); if (Array.isArray(imported)) { tags = imported; saveTags(); renderList(); } } catch (err) { alert("Error parsing JSON"); } }; 
        reader.readAsText(file); event.target.value = ''; 
    }

    // --- SMART Filename Extraction Engine ---
    function extractTagsFromName(filename, knownTags) {
        let activeTags = [];
        let baseName = filename.trim();
        let parsing = true;

        const sortedTags = [...knownTags].sort((a, b) => b.length - a.length);

        while(parsing) {
            parsing = false;
            for (let tag of sortedTags) {
                if (baseName.startsWith(tag)) {
                    const afterTag = baseName.substring(tag.length);
                    if (afterTag === '' || afterTag.startsWith('_') || afterTag.startsWith(',') || afterTag.startsWith('.')) {
                        activeTags.push(tag);
                        baseName = afterTag;
                        
                        while(baseName.startsWith('_') || baseName.startsWith(',') || baseName.startsWith(' ')) {
                            baseName = baseName.substring(1);
                        }
                        parsing = true; break; 
                    }
                }
            }
        }
        return { activeTags, baseName };
    }

    // --- Dynamic Workspace Tags (MULTI-SELECT SUPPORT) ---
    function renderWorkspaceTags() {
        const grid = document.getElementById('tag-buttons-workspace');
        grid.innerHTML = '';

        if (selectedIds.size === 0) {
            grid.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; color: var(--icon-color); font-size: 13px;">No files selected. Click a file or Shift/Ctrl-Click for multiple.</div>';
            return;
        }

        if (selectedIds.size > 1) {
            const status = document.createElement('div');
            status.style.cssText = 'grid-column: 1 / -1; text-align: center; color: var(--accent); font-size: 13px; font-weight: bold; margin-bottom: 10px;';
            status.innerText = `Applying tags to ${selectedIds.size} selected files`;
            grid.appendChild(status);
        }

        let commonTags = null;
        
        selectedIds.forEach(id => {
            const f = files.find(x => x.id === id);
            if (!f) return;
            const extraction = extractTagsFromName(f.name, tags);
            if (commonTags === null) {
                commonTags = new Set(extraction.activeTags);
            } else {
                const intersection = new Set();
                extraction.activeTags.forEach(t => {
                    if (commonTags.has(t)) intersection.add(t);
                });
                commonTags = intersection;
            }
        });

        const activeTags = Array.from(commonTags || []);

        tags.forEach(tag => {
            const b = document.createElement('button');
            b.className = 'btn';

            if (activeTags.includes(tag)) {
                b.classList.add('btn-tag-active');
                b.innerHTML = `${tag} <span class="tag-remove-cross">✖</span>`;
                b.onclick = () => {
                    const operations = [];
                    selectedIds.forEach(id => {
                        const f = files.find(x => x.id === id);
                        if(!f) return;
                        const extraction = extractTagsFromName(f.name, tags);
                        let fileTags = extraction.activeTags.filter(t => t !== tag);
                        const newPrefix = fileTags.length > 0 ? fileTags.join(', ') + ', ' : '';
                        operations.push({ index: f.index, newName: newPrefix + extraction.baseName });
                    });
                    executeBatchRename(operations);
                };
            } else {
                b.innerText = tag;
                b.onclick = () => {
                    const operations = [];
                    selectedIds.forEach(id => {
                        const f = files.find(x => x.id === id);
                        if(!f) return;
                        const extraction = extractTagsFromName(f.name, tags);
                        let fileTags = [...extraction.activeTags];
                        if (!fileTags.includes(tag)) fileTags.push(tag);
                        const newPrefix = fileTags.join(', ') + ', ';
                        operations.push({ index: f.index, newName: newPrefix + extraction.baseName });
                    });
                    executeBatchRename(operations);
                };
            }
            grid.appendChild(b);
        });
    }

    // --- Drag and Drop File Moving Logic ---
    async function handleDrop(e, targetPath) {
        try {
            const data = e.dataTransfer.getData('application/json');
            if (!data) return;
            
            const draggedIds = JSON.parse(data);
            const targetDirHandle = dirHandles[targetPath];
            if (!targetDirHandle) return;

            const operations = [];
            for (let id of draggedIds) {
                const f = allFiles.find(x => x.id === id);
                if (!f || f.path === targetPath) continue; 
                operations.push({
                    type: 'move',
                    file: f,
                    oldPath: f.path,
                    newPath: targetPath,
                    name: f.name,
                    targetDirHandle
                });
            }

            if (operations.length > 0) {
                const batchHistory = [];
                for(let op of operations) {
                    await op.file.handle.move(op.targetDirHandle, op.name);
                    updateOriginalStateMap(op.oldPath, op.name, op.newPath, op.name, op.file);
                    op.file.path = op.newPath;
                    batchHistory.push(op);
                }
                historyStack.push(batchHistory);
                redoStack = [];
                renderList();
            }
        } catch (err) {
            console.error("Drop error", err);
            alert("Failed to move files. Ensure files are not open elsewhere.");
        }
    }

    // --- Rendering Logic ---
    function renderList(isSearchEvent = false) {
        const searchInput = document.getElementById('file-search-input');
        const searchQuery = searchInput ? searchInput.value.toLowerCase() : '';
        const container = document.getElementById('file-list-container');

        container.innerHTML = '';
        
        // Root Drop Zone Listener
        container.ondragover = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; };
        container.ondrop = async (e) => { e.preventDefault(); await handleDrop(e, ''); };
        
        if (isSearchEvent) {
            if (searchQuery) searchResults = allFiles.filter(f => f.name.toLowerCase().includes(searchQuery));
            else searchResults = null;
        }

        let workingFiles = searchResults || allFiles;

        // Apply Cached Filter State (So items don't jump away until you reset the filter)
        if (filterState !== 0) {
            workingFiles = workingFiles.filter(f => activeFilterFiles.has(f));
        }

        if (workingFiles.length === 0) {
            container.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--icon-color); font-size: 13px;">No files found.</div>';
            files = [];
            currentIndex = -1;
            renderWorkspaceTags();
            return;
        }

        const newSortedFiles = [];

        // Helper to construct a single file DOM element (used in both Tree and Flat list)
        function createFileNode(item) {
            newSortedFiles.push(item);
            item.index = newSortedFiles.length - 1;

            const li = document.createElement('li');
            const isActive = selectedIds.has(item.id);
            li.className = `file-item ${isActive ? 'active' : ''}`;
            
            // Session-based rename highlighting
            if (item.name !== item.originalName || item.path !== item.originalPath) li.classList.add('renamed');
            
            li.dataset.index = item.index; 
            li.dataset.id = item.id;
            
            // Multi-Select & Drag Logic
            li.draggable = true;
            li.ondragstart = (e) => {
                if (!selectedIds.has(item.id)) {
                    selectedIds.clear();
                    selectedIds.add(item.id);
                    lastClickedId = item.id;
                    document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
                    li.classList.add('active');
                    renderWorkspaceTags();
                }
                e.dataTransfer.setData('application/json', JSON.stringify(Array.from(selectedIds)));
                e.dataTransfer.effectAllowed = 'move';
            };

            li.onclick = (e) => {
                if (e.target.tagName === 'INPUT' || e.target.closest('.btn-icon')) return;

                if (e.ctrlKey || e.metaKey) {
                    if (selectedIds.has(item.id)) selectedIds.delete(item.id);
                    else selectedIds.add(item.id);
                    lastClickedId = item.id;
                } else if (e.shiftKey && lastClickedId !== null) {
                    const lastIdx = files.findIndex(f => f.id === lastClickedId);
                    if (lastIdx > -1) {
                        const min = Math.min(lastIdx, item.index);
                        const max = Math.max(lastIdx, item.index);
                        selectedIds.clear();
                        for (let i = min; i <= max; i++) selectedIds.add(files[i].id);
                    }
                } else {
                    selectedIds.clear();
                    selectedIds.add(item.id);
                    lastClickedId = item.id;
                    loadTrack(item.index); 
                }

                document.querySelectorAll('.file-item').forEach(el => {
                    if (selectedIds.has(el.dataset.id)) el.classList.add('active');
                    else el.classList.remove('active');
                });
                
                renderWorkspaceTags();
            };

            // Wrap Name and Path flexibly for Flat List
            const nameContainer = document.createElement('div');
            nameContainer.style.flex = "1";
            nameContainer.style.display = "flex";
            nameContainer.style.flexDirection = "column";

            const nameSpan = document.createElement('span');
            nameSpan.className = 'file-name';
            nameSpan.style.flex = "none";
            nameSpan.innerText = item.name;
            nameContainer.appendChild(nameSpan);

            // Add context subtitle if in Flat Filter View
            if (filterState !== 0 && item.path) {
                const pathSpan = document.createElement('span');
                pathSpan.style.fontSize = '10px';
                pathSpan.style.color = 'var(--icon-color)';
                pathSpan.style.marginTop = '2px';
                pathSpan.innerText = item.path;
                nameContainer.appendChild(pathSpan);
            }

            const editBtn = document.createElement('button');
            editBtn.className = 'btn-icon';
            editBtn.innerHTML = SVGs.pencil;
            
            editBtn.onclick = (e) => {
                e.stopPropagation();
                const input = document.createElement('input');
                input.type = 'text'; input.className = 'rename-input'; input.value = item.name;
                
                input.onkeydown = (ev) => {
                    if (ev.key === 'Enter') executeBatchRename([{ index: item.index, newName: input.value }]);
                    else if (ev.key === 'Escape') renderList();
                };
                
                li.innerHTML = ''; li.appendChild(input); input.focus();
                const dotIndex = item.name.lastIndexOf('.');
                input.setSelectionRange(0, dotIndex > -1 ? dotIndex : item.name.length);
            };

            li.appendChild(nameContainer);
            li.appendChild(editBtn);

            return li;
        }

        // --- Render Strategy: Tree (All) vs Flat List (Filtered) ---
        if (filterState === 0) {
            // Default Folder Tree View
            const treeData = {};
            workingFiles.forEach((file) => {
                const parts = file.path ? file.path.split('/') : [];
                let currentLevel = treeData;
                parts.forEach(part => {
                    if (!currentLevel[part]) currentLevel[part] = { _isDir: true, _children: {} };
                    currentLevel = currentLevel[part]._children;
                });
                currentLevel[file.name] = file;
            });

            function buildHTMLTree(node, parentElement, pathPrefix = '') {
                const ul = document.createElement('ul'); ul.className = 'tree-list';
                
                const keys = Object.keys(node).sort((a, b) => {
                    if (node[a]._isDir && !node[b]._isDir) return -1;
                    if (!node[a]._isDir && node[b]._isDir) return 1;
                    return a.localeCompare(b);
                });

                keys.forEach(key => {
                    const item = node[key];
                    if (item._isDir) {
                        const folderPath = pathPrefix ? `${pathPrefix}/${key}` : key;
                        const li = document.createElement('li');
                        
                        let shouldCollapse = !isFoldersExpanded; 
                        if (folderStates[folderPath] === 'collapsed') shouldCollapse = true;
                        else if (folderStates[folderPath] === 'expanded') shouldCollapse = false;
                        
                        if (searchResults && searchQuery) shouldCollapse = false; 
                        
                        li.className = `folder-item ${shouldCollapse ? 'collapsed' : ''}`;
                        li.dataset.path = folderPath; 

                        const folderTitle = document.createElement('div');
                        folderTitle.className = 'folder-title';
                        folderTitle.title = "Click to Expand/Collapse. Ctrl/Cmd+Click to select all files inside.";
                        folderTitle.innerHTML = `${SVGs.folder} <span>${key}</span>`;
                        
                        folderTitle.ondragover = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; };
                        folderTitle.ondragenter = (e) => { e.currentTarget.classList.add('drag-over'); };
                        folderTitle.ondragleave = (e) => { e.currentTarget.classList.remove('drag-over'); };
                        folderTitle.ondrop = async (e) => {
                            e.preventDefault();
                            e.stopPropagation(); 
                            e.currentTarget.classList.remove('drag-over');
                            await handleDrop(e, folderPath);
                        };

                        folderTitle.onclick = (e) => { 
                            e.stopPropagation(); 
                            if (e.ctrlKey || e.metaKey || e.shiftKey) {
                                files.forEach(f => {
                                    if (f.path === folderPath || f.path.startsWith(folderPath + '/')) {
                                        selectedIds.add(f.id);
                                    }
                                });
                                document.querySelectorAll('.file-item').forEach(el => {
                                    if (selectedIds.has(el.dataset.id)) el.classList.add('active');
                                });
                                renderWorkspaceTags();
                            } else {
                                li.classList.toggle('collapsed'); 
                                folderStates[folderPath] = li.classList.contains('collapsed') ? 'collapsed' : 'expanded';
                                localStorage.setItem('sfx_folder_states', JSON.stringify(folderStates));
                            }
                        };
                        
                        const folderContents = document.createElement('div');
                        folderContents.className = 'folder-contents';
                        
                        li.appendChild(folderTitle);
                        buildHTMLTree(item._children, folderContents, folderPath);
                        li.appendChild(folderContents);
                        ul.appendChild(li);
                    } else {
                        ul.appendChild(createFileNode(item));
                    }
                });
                parentElement.appendChild(ul);
            }
            buildHTMLTree(treeData, container, '');
        } else {
            // Flat List View (For Filters)
            const ul = document.createElement('ul'); ul.className = 'tree-list';
            workingFiles.forEach(item => {
                ul.appendChild(createFileNode(item));
            });
            container.appendChild(ul);
        }

        files = newSortedFiles;
        renderWorkspaceTags(); 
    }

    // --- Audio Control ---
    async function loadTrack(index) {
        if (index < 0 || index >= files.length) return;
        const wasPlaying = audioEngine.src ? !audioEngine.paused : false;

        currentIndex = index;
        const f = files[currentIndex];
        
        localStorage.setItem('sfx_last_selected_track', JSON.stringify({ name: f.name, path: f.path }));
        document.getElementById('current-title').innerText = f.name;
        
        const fileData = await f.handle.getFile();
        audioEngine.src = URL.createObjectURL(fileData);
        
        if (wasPlaying) { audioEngine.play(); playPauseBtn.innerHTML = SVGs.pause; } 
        else { audioEngine.pause(); playPauseBtn.innerHTML = SVGs.play; }

        progressBar.style.width = '0%'; document.getElementById('time-current').innerText = '0:00';
        
        if (f.path && filterState === 0) { // Only expand folders if we are in Tree view
            const parts = f.path.split('/');
            let incrementalPath = '';
            parts.forEach(p => {
                if(!p) return;
                incrementalPath = incrementalPath ? `${incrementalPath}/${p}` : p;
                const safePath = incrementalPath.replace(/"/g, '\\"');
                const folder = document.querySelector(`.folder-item[data-path="${safePath}"]`);
                if (folder) {
                    folder.classList.remove('collapsed');
                    folderStates[incrementalPath] = 'expanded';
                }
            });
            localStorage.setItem('sfx_folder_states', JSON.stringify(folderStates));
        }

        const newActive = document.querySelector(`.file-item[data-index="${currentIndex}"]`);
        if (newActive) newActive.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function togglePlay() {
        if (audioEngine.paused) { audioEngine.play(); playPauseBtn.innerHTML = SVGs.pause; }
        else { audioEngine.pause(); playPauseBtn.innerHTML = SVGs.play; }
    }

    audioEngine.ontimeupdate = () => {
        const pct = (audioEngine.currentTime / audioEngine.duration) * 100;
        progressBar.style.width = pct + '%';
        document.getElementById('time-current').innerText = formatTime(audioEngine.currentTime);
        document.getElementById('time-total').innerText = formatTime(audioEngine.duration);
    };

    function formatTime(s) { if (isNaN(s)) return "0:00"; const m = Math.floor(s / 60); const sec = Math.floor(s % 60); return `${m}:${sec < 10 ? '0' : ''}${sec}`; }
    
    function nextTrack() { 
        if(currentIndex + 1 < files.length) {
            const fileObj = files[currentIndex + 1];
            selectedIds.clear();
            selectedIds.add(fileObj.id);
            lastClickedId = fileObj.id;
            
            document.querySelectorAll('.file-item').forEach(el => {
                if (selectedIds.has(el.dataset.id)) el.classList.add('active');
                else el.classList.remove('active');
            });
            renderWorkspaceTags();
            loadTrack(currentIndex + 1); 
        }
    }
    
    function prevTrack() { 
        if(currentIndex - 1 >= 0) {
            const fileObj = files[currentIndex - 1];
            selectedIds.clear();
            selectedIds.add(fileObj.id);
            lastClickedId = fileObj.id;
            
            document.querySelectorAll('.file-item').forEach(el => {
                if (selectedIds.has(el.dataset.id)) el.classList.add('active');
                else el.classList.remove('active');
            });
            renderWorkspaceTags();
            loadTrack(currentIndex - 1); 
        }
    }

    document.getElementById('progress-container').onclick = (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        audioEngine.currentTime = ((e.clientX - rect.left) / rect.width) * audioEngine.duration;
    };

    // --- Renaming Execution (BATCH SUPPORT) ---
    async function executeBatchRename(operations) {
        const batchHistory = [];
        
        for (const op of operations) {
            const f = files[op.index];
            if (!f) continue;
            const oldName = f.name;
            if (op.newName === oldName || !op.newName.trim()) continue;
            
            try {
                await f.handle.move(op.newName);
                updateOriginalStateMap(f.path, oldName, f.path, op.newName, f);
                f.name = op.newName;
                batchHistory.push({ type: 'rename', file: f, oldName, newName: op.newName });
                
                if (currentIndex === op.index) {
                    document.getElementById('current-title').innerText = op.newName;
                    localStorage.setItem('sfx_last_selected_track', JSON.stringify({ name: f.name, path: f.path }));
                }
            } catch (e) { console.error("Error renaming", f.name, e); }
        }
        
        if (batchHistory.length > 0) {
            historyStack.push(batchHistory);
            redoStack = []; 
            renderList(); 
        }
    }

    async function undo() {
        if (!historyStack.length) return;
        const batch = historyStack.pop();
        for (const act of batch) {
            if (act.type === 'move') {
                const oldDirHandle = dirHandles[act.oldPath];
                await act.file.handle.move(oldDirHandle, act.name);
                updateOriginalStateMap(act.newPath, act.name, act.oldPath, act.name, act.file);
                act.file.path = act.oldPath;
            } else {
                await act.file.handle.move(act.oldName);
                updateOriginalStateMap(act.file.path, act.newName, act.file.path, act.oldName, act.file);
                act.file.name = act.oldName;
                if (files[currentIndex] === act.file) {
                    document.getElementById('current-title').innerText = act.oldName;
                    localStorage.setItem('sfx_last_selected_track', JSON.stringify({ name: act.file.name, path: act.file.path }));
                }
            }
        }
        redoStack.push(batch);
        renderList();
    }

    async function redo() {
        if (!redoStack.length) return;
        const batch = redoStack.pop();
        for (const act of batch) {
            if (act.type === 'move') {
                const newDirHandle = dirHandles[act.newPath];
                await act.file.handle.move(newDirHandle, act.name);
                updateOriginalStateMap(act.oldPath, act.name, act.newPath, act.name, act.file);
                act.file.path = act.newPath;
            } else {
                await act.file.handle.move(act.newName);
                updateOriginalStateMap(act.file.path, act.oldName, act.file.path, act.newName, act.file);
                act.file.name = act.newName;
                if (files[currentIndex] === act.file) {
                    document.getElementById('current-title').innerText = act.newName;
                    localStorage.setItem('sfx_last_selected_track', JSON.stringify({ name: act.file.name, path: act.file.path }));
                }
            }
        }
        historyStack.push(batch);
        renderList();
    }
</script>
