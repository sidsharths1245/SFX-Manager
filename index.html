<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flow State SFX Manager Pro</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --panel-bg: #141414;
            --accent: #007aff;
            --text: #e0e0e0;
            --border: #282828;
            --input-bg: #1e1e1e;
            --danger: #ff453a;
            --success: #32d74b;
            --icon-color: #888;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .icon { width: 16px; height: 16px; min-width: 16px; min-height: 16px; max-width: 16px; max-height: 16px; flex-shrink: 0; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; display: inline-block; }
        .icon-sm { width: 14px; height: 14px; min-width: 14px; min-height: 14px; max-width: 14px; max-height: 14px; }
        .icon-lg { width: 24px; height: 24px; min-width: 24px; min-height: 24px; max-width: 24px; max-height: 24px; }
        .fill-icon { fill: currentColor; stroke: none; }

        /* --- Layout --- */
        #file-sidebar { order: 1; min-width: 250px; width: 400px; max-width: 700px; background: var(--panel-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: relative; }
        #main { order: 2; flex: 1; display: flex; flex-direction: column; position: relative; }
        #tag-sidebar { order: 3; width: 280px; background: var(--panel-bg); border-left: 1px solid var(--border); display: flex; flex-direction: column; transition: width 0.3s ease, min-width 0.3s ease; overflow: hidden; white-space: nowrap; }

        #tag-sidebar.collapsed { width: 0; min-width: 0; border-left: none; }
        .panel-header { padding: 15px; font-weight: bold; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        #tag-manager-list { flex: 1; overflow-y: auto; padding: 15px; list-style: none; margin: 0; }
        .tag-edit-item { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
        .tag-edit-item input { flex: 1; min-width: 0; }
        .panel-footer { padding: 15px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
        
        #top-bar { padding: 15px; display: flex; border-bottom: 1px solid var(--border); align-items: center; gap: 10px;}
        #workspace-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; overflow-y: auto; }

        #resizer { width: 4px; cursor: col-resize; background: transparent; position: absolute; right: -2px; top: 0; bottom: 0; z-index: 10; }
        #resizer:hover { background: var(--accent); }
        
        .search-box { display: flex; align-items: center; background: var(--input-bg); border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; transition: 0.2s; }
        .search-box:focus-within { border-color: var(--accent); }
        .search-box input { border: none !important; background: transparent; width: 100%; color: white; outline: none; padding-left: 8px; font-size: 13px; }

        #file-list-container { flex: 1; overflow-y: auto; padding: 10px 0; }
        .tree-list { list-style: none; padding-left: 15px; margin: 0; }
        #file-list-container > .tree-list { padding-left: 0; } 
        
        .folder-item { margin: 2px 0; }
        .folder-title { padding: 8px 15px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: #aaa; }
        .folder-title:hover { background: #1e1e1e; color: white; }
        .folder-icon { color: var(--accent); transition: 0.2s; }
        .folder-item.collapsed .folder-icon { color: var(--icon-color); }
        .folder-contents { overflow: hidden; }
        .folder-item.collapsed .folder-contents { display: none; }
        
        .file-item { padding: 8px 15px 8px 25px; border-bottom: 1px solid #222; display: flex; align-items: flex-start; gap: 10px; cursor: pointer; }
        .file-item:hover { background: #1a1a1a; }
        .file-item.active { background: #1e1e1e; border-left: 3px solid var(--accent); padding-left: 22px; }
        .file-item .btn-icon { margin-top: -2px; } 
        
        .file-name { flex: 1; font-size: 13px; display: flex; align-items: flex-start; flex-wrap: wrap; gap: 8px; word-break: break-word; white-space: normal; line-height: 1.4; }
        .file-item input.rename-input { flex: 1; }
        .file-item.renamed .file-name::before { content: ''; display: inline-block; width: 6px; height: 6px; min-width: 6px; background: var(--success); border-radius: 50%; flex-shrink: 0; margin-top: 5px; }

        #custom-player { width: 100%; max-width: 600px; background: #1a1a1a; padding: 20px; border-radius: 12px; margin-bottom: 30px; }
        .player-controls { display: flex; align-items: center; justify-content: center; gap: 20px; margin-top: 15px; }
        #progress-container { width: 100%; height: 6px; background: #333; border-radius: 3px; cursor: pointer; position: relative; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); border-radius: 3px; pointer-events: none; }
        .time-info { display: flex; justify-content: space-between; font-size: 11px; margin-top: 5px; color: var(--icon-color); }

        input[type="text"] { background: var(--input-bg); border: 1px solid var(--border); color: white; padding: 6px 10px; border-radius: 4px; font-size: 13px; outline: none; }
        input[type="text"]:focus { border-color: var(--accent); }
        .btn { display: flex; align-items: center; justify-content: center; gap: 8px; background: #2a2a2a; color: white; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .btn:hover { background: #3a3a3a; }
        .btn-accent { background: var(--accent); }
        .btn-accent:hover { background: #005ecb; }
        .btn-danger { color: var(--danger); }
        .btn-danger:hover { background: rgba(255, 69, 58, 0.1); }
        .btn-icon { background: transparent; border: none; color: var(--icon-color); cursor: pointer; padding: 6px; border-radius: 4px; transition: 0.2s; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .btn-icon:hover { color: white; background: rgba(255,255,255,0.05); }
        .tag-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; width: 100%; max-width: 600px; }

        .btn-tag-active { background: var(--accent); border-color: var(--accent); }
        .btn-tag-active:hover { background: #005ecb; }
        .tag-remove-cross { margin-left: 6px; opacity: 0.6; font-weight: bold; font-size: 11px; }
        .btn-tag-active:hover .tag-remove-cross { opacity: 1; color: #ffd1d1; }

        #detection-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); }
        .modal-content { position: relative; background: var(--panel-bg); border: 1px solid var(--border); border-radius: 12px; padding: 25px; width: 90%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .detected-tags-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-height: 300px; overflow-y: auto; margin: 15px 0; padding-right: 10px; }
        .detected-tag-label { display: flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer; padding: 8px; border-radius: 6px; background: #1a1a1a; border: 1px solid #222; }
        .detected-tag-label:hover { background: #222; border-color: #333; }
        .detected-tag-label input[type="checkbox"] { cursor: pointer; width: 16px; height: 16px; accent-color: var(--accent); }
    </style>
</head>
<body>

    <div id="detection-modal" style="display: none;">
        <div class="modal-overlay" onclick="closeDetectionModal()"></div>
        <div class="modal-content">
            <h3 style="margin-top:0; margin-bottom:5px;">Detected New Tags</h3>
            <p style="font-size:13px; color:#aaa; margin-top:0;">Uncheck any tags you do not want to import:</p>
            <div id="detected-tags-list" class="detected-tags-grid"></div>
            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                <button class="btn" onclick="closeDetectionModal()">Cancel</button>
                <button class="btn btn-accent" onclick="importDetectedTags()">Import Selected</button>
            </div>
        </div>
    </div>

    <div id="file-sidebar">
        <div id="resizer"></div>
        <div class="panel-header" style="flex-direction: column; align-items: stretch; gap: 10px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span>File Explorer</span>
                <button class="btn-icon" id="toggle-folders-btn" onclick="toggleAllFolders()" title="Toggle Folders">
                    <svg class="icon" viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"></polyline></svg>
                </button>
            </div>
            <div class="search-box">
                <svg class="icon icon-sm" style="color: var(--icon-color);" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="file-search-input" placeholder="Search files..." oninput="handleSearch()">
            </div>
        </div>
        <div id="file-list-container"></div>
    </div>

    <div id="main">
        <div id="top-bar">
            <button id="close-folder-btn" class="btn btn-danger" onclick="closeFolder()" title="Close current folder" style="display: none;">
                <svg class="icon icon-sm" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                Close Folder
            </button>
            <button id="init-btn" class="btn btn-accent" style="display: none;">
                <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                Open Audio Folder
            </button>
            <div style="flex:1"></div>
            <button class="btn" onclick="toggleTagsSidebar()">
                <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
                Manage Tags
            </button>
        </div>
        
        <div id="workspace-content" style="display:none;">
            <div id="custom-player">
                <div id="current-title" style="text-align:center; margin-bottom:15px; font-weight:600; word-break: break-word; line-height: 1.4;">Select a sound</div>
                <div id="progress-container"><div id="progress-bar"></div></div>
                <div class="time-info"><span id="time-current">0:00</span><span id="time-total">0:00</span></div>
                <div class="player-controls">
                    <button class="btn-icon" onclick="prevTrack()" title="Previous (Up Arrow)"><svg class="icon icon-lg fill-icon" viewBox="0 0 24 24"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor"></line></svg></button>
                    <button class="btn-icon" id="play-pause-btn" onclick="togglePlay()" style="color: white;" title="Play/Pause (Space)"><svg class="icon icon-lg fill-icon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg></button>
                    <button class="btn-icon" onclick="nextTrack()" title="Next (Down Arrow)"><svg class="icon icon-lg fill-icon" viewBox="0 0 24 24"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor"></line></svg></button>
                </div>
            </div>
            <div class="tag-grid" id="tag-buttons-workspace"></div>
            <div style="margin-top: 30px; display: flex; gap: 10px; justify-content: center;">
                <button class="btn" onclick="undo()" style="color:var(--danger)" title="Undo (Cmd/Ctrl + Z)"><svg class="icon icon-sm" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg> Undo</button>
                <button class="btn" id="redo-btn" onclick="redo()" style="color:var(--success)" title="Redo (Cmd/Ctrl + Shift + Z)"><svg class="icon icon-sm" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg> Redo</button>
            </div>
        </div>
    </div>

    <div id="tag-sidebar">
        <div class="panel-header">
            <span>Tag Manager</span>
            <button class="btn-icon" onclick="toggleTagsSidebar()">
                <svg class="icon" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
        </div>
        <div style="padding: 15px; border-bottom: 1px solid var(--border); display: flex; gap: 8px;">
            <input type="text" id="new-tag-input" placeholder="New tag..." onkeydown="if(event.key==='Enter') addTag()">
            <button class="btn btn-accent" onclick="addTag()">Add</button>
        </div>
        <ul id="tag-manager-list"></ul>
        <div class="panel-footer">
            <button class="btn" onclick="autoDetectTags()" title="Scans folder for tags in filenames">
                <svg class="icon icon-sm" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                Import Tags from Files
            </button>
            <button class="btn" onclick="exportTags()">
                <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                Export Tags
            </button>
            <button class="btn" onclick="document.getElementById('import-file').click()">
                <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Import Tags
            </button>
            <input type="file" id="import-file" style="display:none" accept=".json" onchange="importTags(event)">
        </div>
    </div>

    <audio id="audio-engine"></audio>

<script>
    const SVGs = {
        trash: `<svg class="icon icon-sm" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`,
        pencil: `<svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>`,
        folder: `<svg class="icon folder-icon" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>`,
        play: `<svg class="icon icon-lg fill-icon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>`,
        pause: `<svg class="icon icon-lg fill-icon" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>`,
        arrowUp: `<svg class="icon" viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"></polyline></svg>`,
        arrowDown: `<svg class="icon" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg>`,
        resume: `<svg class="icon icon-sm" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>`
    };

    function openDB() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.open('SFXManagerStore', 1);
            req.onupgradeneeded = (e) => e.target.result.createObjectStore('workspace');
            req.onsuccess = (e) => resolve(e.target.result);
            req.onerror = (e) => reject(e.target.error);
        });
    }

    async function saveDirectoryHandle(handle) {
        const db = await openDB();
        return new Promise(resolve => {
            const tx = db.transaction('workspace', 'readwrite');
            tx.objectStore('workspace').put(handle, 'savedDir');
            tx.oncomplete = () => resolve();
        });
    }

    async function loadDirectoryHandle() {
        const db = await openDB();
        return new Promise(resolve => {
            const tx = db.transaction('workspace', 'readonly');
            const req = tx.objectStore('workspace').get('savedDir');
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => resolve(null);
        });
    }

    async function closeFolder() {
        if(confirm("Disconnect folder? Tags are saved.")) {
            const db = await openDB();
            const tx = db.transaction('workspace', 'readwrite');
            tx.objectStore('workspace').delete('savedDir');
            location.reload(); 
        }
    }

    async function verifyPermission(fileHandle) {
        const opts = { mode: 'readwrite' };
        if ((await fileHandle.queryPermission(opts)) === 'granted') return true;
        if ((await fileHandle.requestPermission(opts)) === 'granted') return true;
        return false;
    }

    const DEFAULT_TAGS = ['Comedy', 'Tabla', 'Impact', 'Transition', 'Foley', 'Cinematic'];
    let tags = JSON.parse(localStorage.getItem('sfx_tags')) || DEFAULT_TAGS;
    let preservedCollapsed = new Set(JSON.parse(localStorage.getItem('sfx_collapsed_folders')) || []);
    let isFoldersExpanded = localStorage.getItem('sfx_global_folders_expanded') !== 'false';
    let savedSearchQuery = localStorage.getItem('sfx_search_query') || '';
    let savedSidebarWidth = localStorage.getItem('sfx_sidebar_width') || '400';
    let isTagSidebarCollapsed = localStorage.getItem('sfx_tag_sidebar_collapsed') === 'true';
    
    let dirHandle, allFiles = [], files = [], searchResults = null, currentIndex = -1, historyStack = [], redoStack = [];
    const audioEngine = document.getElementById('audio-engine');
    const progressBar = document.getElementById('progress-bar');
    const playPauseBtn = document.getElementById('play-pause-btn');

    document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
        else if (e.code === 'ArrowDown') { e.preventDefault(); nextTrack(); }
        else if (e.code === 'ArrowUp') { e.preventDefault(); prevTrack(); }
        else if (e.code === 'ArrowRight') { e.preventDefault(); if(audioEngine.src) audioEngine.currentTime += 5; }
        else if (e.code === 'ArrowLeft') { e.preventDefault(); if(audioEngine.src) audioEngine.currentTime -= 5; }
        else if (e.code === 'KeyZ' && (e.metaKey || e.ctrlKey) && !e.shiftKey) { e.preventDefault(); undo(); }
        else if ((e.code === 'KeyZ' && (e.metaKey || e.ctrlKey) && e.shiftKey) || (e.code === 'KeyY' && (e.metaKey || e.ctrlKey))) { e.preventDefault(); redo(); }
    });

    window.onload = async () => {
        // Apply Tag Sidebar state immediately
        const tagSidebar = document.getElementById('tag-sidebar');
        if (isTagSidebarCollapsed) tagSidebar.classList.add('collapsed');
        
        const fileSidebar = document.getElementById('file-sidebar');
        fileSidebar.style.width = savedSidebarWidth + 'px';
        
        const searchInput = document.getElementById('file-search-input');
        if (searchInput) searchInput.value = savedSearchQuery;
        
        saveTags(); 

        const savedHandle = await loadDirectoryHandle();
        const initBtn = document.getElementById('init-btn');
        const closeBtn = document.getElementById('close-folder-btn');
        
        if (savedHandle) {
            const permStatus = await savedHandle.queryPermission({ mode: 'readwrite' });
            if (permStatus === 'granted') {
                dirHandle = savedHandle;
                closeBtn.style.display = 'flex';
                document.getElementById('workspace-content').style.display = 'flex';
                await scanDirectory(dirHandle);
                renderList(!!savedSearchQuery);
            } else {
                initBtn.style.display = 'flex';
                initBtn.innerHTML = `${SVGs.resume} Resume Workspace`;
                initBtn.onclick = async () => {
                    if (await verifyPermission(savedHandle)) {
                        dirHandle = savedHandle;
                        initBtn.style.display = 'none'; closeBtn.style.display = 'flex';
                        document.getElementById('workspace-content').style.display = 'flex';
                        await scanDirectory(dirHandle);
                        renderList(!!savedSearchQuery);
                    }
                };
            }
        } else {
            initBtn.style.display = 'flex';
            initBtn.onclick = async () => {
                dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                await saveDirectoryHandle(dirHandle);
                initBtn.style.display = 'none'; closeBtn.style.display = 'flex';
                document.getElementById('workspace-content').style.display = 'flex';
                await scanDirectory(dirHandle);
                renderList(!!savedSearchQuery);
            };
        }
    }

    function autoDetectTags() {
        let newTags = new Set();
        allFiles.forEach(f => {
            let name = f.name.includes('.') ? f.name.substring(0, f.name.lastIndexOf('.')) : f.name;
            if (name.match(/[,_]/)) {
                let parts = name.split(/[,_]+/);
                if (parts.length > 1) {
                    for (let i = 0; i < parts.length - 1; i++) {
                        let clean = parts[i].trim();
                        if (clean && !tags.includes(clean)) newTags.add(clean);
                    }
                }
            }
        });
        if (newTags.size > 0) {
            const grid = document.getElementById('detected-tags-list'); grid.innerHTML = '';
            Array.from(newTags).sort().forEach(tag => {
                const lbl = document.createElement('label'); lbl.className = 'detected-tag-label';
                const cb = document.createElement('input'); cb.type = 'checkbox'; cb.value = tag; cb.checked = true;
                lbl.appendChild(cb); lbl.appendChild(document.createTextNode(tag)); grid.appendChild(lbl);
            });
            document.getElementById('detection-modal').style.display = 'flex';
        } else alert("No new tags found.");
    }

    function closeDetectionModal() { document.getElementById('detection-modal').style.display = 'none'; }
    function importDetectedTags() {
        const checkboxes = document.querySelectorAll('#detected-tags-list input[type="checkbox"]:checked');
        tags.push(...Array.from(checkboxes).map(cb => cb.value));
        saveTags(); renderList(); closeDetectionModal();
    }

    function saveTags() {
        tags.sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));
        localStorage.setItem('sfx_tags', JSON.stringify(tags));
        renderTagManager();
        renderWorkspaceTags();
    }

    function addTag() { const i = document.getElementById('new-tag-input'); if(i.value.trim()){ tags.push(i.value.trim()); i.value=''; saveTags(); } }
    function removeTag(i) { tags.splice(i, 1); saveTags(); }
    function updateTag(i, v) { if(v.trim()){ tags[i]=v.trim(); saveTags(); } }
    function exportTags() { const d = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(tags)); const a = document.createElement('a'); a.href = d; a.download = "sfx_tags.json"; a.click(); }
    function importTags(e) { const r = new FileReader(); r.onload = (ev) => { tags = JSON.parse(ev.target.result); saveTags(); renderList(); }; r.readAsText(e.target.files[0]); }

    function renderTagManager() {
        const l = document.getElementById('tag-manager-list'); l.innerHTML = '';
        tags.forEach((t, i) => {
            const li = document.createElement('li'); li.className = 'tag-edit-item';
            const input = document.createElement('input'); input.type = 'text'; input.value = t; input.onchange = (e) => updateTag(i, e.target.value);
            const btn = document.createElement('button'); btn.className = 'btn-icon'; btn.innerHTML = SVGs.trash; btn.onclick = () => removeTag(i);
            li.appendChild(input); li.appendChild(btn); l.appendChild(li);
        });
    }

    function toggleTagsSidebar() { 
        const s = document.getElementById('tag-sidebar');
        s.classList.toggle('collapsed'); 
        localStorage.setItem('sfx_tag_sidebar_collapsed', s.classList.contains('collapsed'));
    }

    const resizer = document.getElementById('resizer');
    resizer.addEventListener('mousedown', () => { document.addEventListener('mousemove', resize); document.addEventListener('mouseup', () => { document.removeEventListener('mousemove', resize); localStorage.setItem('sfx_sidebar_width', document.getElementById('file-sidebar').offsetWidth); }); });
    function resize(e) { if(e.pageX > 250 && e.pageX < 700) document.getElementById('file-sidebar').style.width = e.pageX + 'px'; }

    function toggleAllFolders() {
        isFoldersExpanded = !isFoldersExpanded;
        document.getElementById('toggle-folders-btn').innerHTML = isFoldersExpanded ? SVGs.arrowUp : SVGs.arrowDown;
        document.querySelectorAll('.folder-item').forEach(f => {
            if(isFoldersExpanded) { f.classList.remove('collapsed'); preservedCollapsed.delete(f.dataset.path); }
            else { f.classList.add('collapsed'); preservedCollapsed.add(f.dataset.path); }
        });
        localStorage.setItem('sfx_collapsed_folders', JSON.stringify([...preservedCollapsed]));
        localStorage.setItem('sfx_global_folders_expanded', isFoldersExpanded);
    }

    function handleSearch() { localStorage.setItem('sfx_search_query', document.getElementById('file-search-input').value); renderList(true); }

    function extractTagsFromName(filename, knownTags) {
        let activeTags = []; let baseName = filename.trim(); let parsing = true;
        const sorted = [...knownTags].sort((a, b) => b.length - a.length);
        while(parsing) {
            parsing = false;
            for (let tag of sorted) {
                if (baseName.startsWith(tag)) {
                    const after = baseName.substring(tag.length);
                    if (after === '' || after.startsWith('_') || after.startsWith(',') || after.startsWith('.')) {
                        activeTags.push(tag); baseName = after;
                        while(baseName.startsWith('_') || baseName.startsWith(',') || baseName.startsWith(' ')) baseName = baseName.substring(1);
                        parsing = true; break; 
                    }
                }
            }
        }
        return { activeTags, baseName };
    }

    function renderWorkspaceTags() {
        const g = document.getElementById('tag-buttons-workspace'); g.innerHTML = '';
        let at = [], bn = "";
        if (currentIndex > -1 && files[currentIndex]) {
            const ex = extractTagsFromName(files[currentIndex].name, tags);
            at = ex.activeTags; bn = ex.baseName;
        }
        tags.forEach(tag => {
            const b = document.createElement('button'); b.className = 'btn';
            if (at.includes(tag)) {
                b.classList.add('btn-tag-active'); b.innerHTML = `${tag} <span class="tag-remove-cross">✖</span>`;
                b.onclick = () => {
                    const nat = at.filter(t => t !== tag);
                    executeRename(currentIndex, (nat.length > 0 ? nat.join(', ') + ', ' : '') + bn);
                };
            } else {
                b.innerText = tag;
                b.onclick = () => executeRename(currentIndex, [...at, tag].join(', ') + ', ' + bn);
            }
            g.appendChild(b);
        });
    }

    async function scanDirectory(h, p = '') {
        for await (const e of h.values()) {
            if (e.kind === 'file' && /\.(wav|mp3|m4a|ogg)$/i.test(e.name)) allFiles.push({ handle: e, name: e.name, originalName: e.name, path: p });
            else if (e.kind === 'directory' && !e.name.startsWith('.')) await scanDirectory(e, p ? `${p}/${e.name}` : e.name);
        }
    }

    function renderList(isSearch = false) {
        const query = document.getElementById('file-search-input').value.toLowerCase();
        const container = document.getElementById('file-list-container');
        const activeFile = currentIndex > -1 ? files[currentIndex] : null;
        if (isSearch) searchResults = query ? allFiles.filter(f => f.name.toLowerCase().includes(query)) : null;
        let working = searchResults || allFiles;
        container.innerHTML = working.length === 0 ? '<div style="padding:20px; color:#888;">Empty.</div>' : '';
        const tree = {};
        working.forEach(f => {
            let cur = tree; (f.path ? f.path.split('/') : []).forEach(p => { if(!cur[p]) cur[p] = { _isDir: true, _children: {} }; cur = cur[p]._children; });
            cur[f.name] = f;
        });
        const nextSet = [];
        function build(node, parent, prefix = '') {
            const ul = document.createElement('ul'); ul.className = 'tree-list';
            Object.keys(node).sort((a,b) => (!!node[a]._isDir === !!node[b]._isDir) ? a.localeCompare(b) : node[a]._isDir ? -1 : 1).forEach(key => {
                const item = node[key]; const li = document.createElement('li');
                if (item._isDir) {
                    const path = prefix ? `${prefix}/${key}` : key;
                    const collapse = (searchResults && query) ? false : preservedCollapsed.has(path) || (!isFoldersExpanded && !preservedCollapsed.has(path));
                    li.className = `folder-item ${collapse ? 'collapsed' : ''}`; li.dataset.path = path;
                    const title = document.createElement('div'); title.className = 'folder-title'; title.innerHTML = `${SVGs.folder} <span>${key}</span>`;
                    title.onclick = (e) => { e.stopPropagation(); li.classList.toggle('collapsed'); li.classList.contains('collapsed') ? preservedCollapsed.add(path) : preservedCollapsed.delete(path); localStorage.setItem('sfx_collapsed_folders', JSON.stringify([...preservedCollapsed])); };
                    const cont = document.createElement('div'); cont.className = 'folder-contents'; li.appendChild(title); build(item._children, cont, path); li.appendChild(cont);
                } else {
                    nextSet.push(item); item.index = nextSet.length - 1;
                    li.className = `file-item ${item === activeFile ? 'active' : ''}`; if(item.name !== item.originalName) li.classList.add('renamed');
                    li.onclick = () => loadTrack(item.index);
                    const span = document.createElement('span'); span.className = 'file-name'; span.innerText = item.name;
                    const edit = document.createElement('button'); edit.className = 'btn-icon'; edit.innerHTML = SVGs.pencil; edit.onclick = (e) => { e.stopPropagation(); const inp = document.createElement('input'); inp.type='text'; inp.value=item.name; inp.onkeydown=(ev)=>{ if(ev.key==='Enter') executeRename(item.index, ev.target.value); else if(ev.key==='Escape') renderList(); }; li.innerHTML=''; li.appendChild(inp); inp.focus(); };
                    li.appendChild(span); li.appendChild(edit);
                }
                ul.appendChild(li);
            });
            parent.appendChild(ul);
        }
        build(tree, container); files = nextSet; currentIndex = activeFile ? files.indexOf(activeFile) : -1; renderWorkspaceTags();
    }

    async function loadTrack(idx) {
        if (idx < 0 || idx >= files.length) return;
        const wasPlaying = audioEngine.src ? !audioEngine.paused : false;
        currentIndex = idx; const f = files[currentIndex];
        document.getElementById('current-title').innerText = f.name;
        audioEngine.src = URL.createObjectURL(await f.handle.getFile());
        if (wasPlaying) { audioEngine.play(); playPauseBtn.innerHTML = SVGs.pause; } else { playPauseBtn.innerHTML = SVGs.play; }
        if (f.path) {
            let inc = ''; f.path.split('/').forEach(p => { if(!p) return; inc = inc ? `${inc}/${p}` : p; const fold = document.querySelector(`.folder-item[data-path="${inc.replace(/"/g, '\\"')}"]`); if(fold){ fold.classList.remove('collapsed'); preservedCollapsed.delete(inc); } });
            localStorage.setItem('sfx_collapsed_folders', JSON.stringify([...preservedCollapsed]));
        }
        renderList(); 
        document.querySelector('.file-item.active')?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function togglePlay() { if (audioEngine.paused){ audioEngine.play(); playPauseBtn.innerHTML = SVGs.pause; } else { audioEngine.pause(); playPauseBtn.innerHTML = SVGs.play; } }
    audioEngine.ontimeupdate = () => { progressBar.style.width = (audioEngine.currentTime / audioEngine.duration) * 100 + '%'; document.getElementById('time-current').innerText = formatTime(audioEngine.currentTime); document.getElementById('time-total').innerText = formatTime(audioEngine.duration); };
    function formatTime(s) { if(isNaN(s)) return "0:00"; const m = Math.floor(s/60); const sc = Math.floor(s%60); return `${m}:${sc<10?'0':''}${sc}`; }
    function nextTrack() { loadTrack(currentIndex + 1); }
    function prevTrack() { loadTrack(currentIndex - 1); }
    document.getElementById('progress-container').onclick = (e) => { audioEngine.currentTime = ((e.clientX - e.currentTarget.getBoundingClientRect().left) / e.currentTarget.offsetWidth) * audioEngine.duration; };

    async function executeRename(idx, name) {
        const f = files[idx]; if (name === f.name || !name.trim()) { renderList(); return; }
        try {
            await f.handle.move(name); historyStack.push({ file: f, old: f.name, new: name }); redoStack = []; f.name = name;
            if(currentIndex === idx) document.getElementById('current-title').innerText = name;
            renderList();
        } catch(e) { alert("File in use."); renderList(); }
    }

    async function undo() { if(!historyStack.length) return; const a = historyStack.pop(); await a.file.handle.move(a.old); redoStack.push(a); a.file.name = a.old; renderList(); }
    async function redo() { if(!redoStack.length) return; const a = redoStack.pop(); await a.file.handle.move(a.new); historyStack.push(a); a.file.name = a.new; renderList(); }
</script>
